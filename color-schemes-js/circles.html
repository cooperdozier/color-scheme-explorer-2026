				<div class="scheme-selector-area">
					<label for="color-1">Set Color 1</label>
					<input type="color"
  					id="color-1"
  					name="color-1"
					/>
					<label for="color-2">Set Color 2</label>
					<input type="color"
  					id="color-2"
  					name="color-2"
					/>
					<label for="color-3">Set Color 3</label>
					<input type="color"
  					id="color-3"

					<label for="color-4">Set Color 4</label>
					<input type="color"
  					id="color-4"

					<label for="color-5">Set Color 5</label>
					<input type="color"
  					id="color-5"
  					name="color-5"
					/>
					<label for="color-6">Set Color 6</label>
					<input type="color"
  					id="color-6"
  					name="color-6"
					/>
					<label for="color-7">Set Color 7</label>
					<input type="color"
  					id="color-7"
  					name="color-7"
					/>
					<label for="color-8">Set Color 8</label>
					<input type="color"
  					id="color-8"
  					name="color-8"

  					id="color-9"
  					name="color-9"
					/>
					<label for="color-10">Set Color 10</label>
					<input type="color"
  					id="color-10"
  					name="color-10"
					/>
					<!-- <button id="get-scheme">Get Scheme</button> -->
				</div>
				
				<hr />

				<label for="background-input">Custom Background</label>
					<input type="color"
  					id="background-input"
  					name="background-input"
					/>

				<hr />

				<label for="background-input-exact">Custom Background Exact</label>
					<input type="text"
					id="background-input-exact"
					name="background-input-exact"
					/>
				<button id="background-input-exact-submit">Submit</button>

				<hr />

				<div class="bg-select-area">
					<label for="bg-select">Choose a background:</label>
					<select id="bg-select">
						<option value="dark">Dark</option>
						<option value="light">Light</option>
						<option value="grey">Grey</option>
						<option value="black">Black</option>
						<option value="white">White</option>
						<option value="beige">Beige</option>
						<option value="random">Random</option>
						<option value="photo">Photo</option>
					</select>
					<button id="bg-select-button">Submit</button>
				</div>
				
				<hr />

				<div class="scheme-selector-area">
					<label for="scheme-select-color">Get Scheme by Color</label>
					<input type="color" id="scheme-select-color" name="scheme-select"/>
					<select id="scheme-select-mode">
						<option value="quad">Quad</option>
						<option value="triad">Triad</option>
						<option value="complement">Complement</option>
						<option value="analogic-complement">Analogic Complement</option>
						<option value="analogic">Analogic</option>
						<option value="monochrome">Monochrome</option>
						<option value="monochrome-dark">Monochrome Dark</option>
						<option value="monochrome-light">Monochrome Light</option>
					</select>
					<button id="get-scheme">Get Scheme</button>
				</div>
				
				<hr />

				<div class="scheme-selector-area">
					<label for="scheme-select-color-exact">Get Scheme by Exact Color</label>
					<input type="text"
  					id="scheme-select-color-exact"
  					name="scheme-select"
  					minlength="6"
  					maxlength="6" 
  					size="10" />
					<!-- <input type="color" id="scheme-select-color" name="scheme-select"/> -->
					<select id="scheme-select-mode-exact">
						<option value="quad">Quad</option>
						<option value="triad">Triad</option>
						<option value="complement">Complement</option>
						<option value="analogic-complement">Analogic Complement</option>
						<option value="analogic">Analogic</option>
						<option value="monochrome">Monochrome</option>
						<option value="monochrome-dark">Monochrome Dark</option>
						<option value="monochrome-light">Monochrome Light</option>
					</select>
					<button id="get-scheme-exact">Get Scheme</button>
				</div>
